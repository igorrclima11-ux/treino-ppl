<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PPL·UL"/>
<meta name="theme-color" content="#0A0A0F"/>
<title>PPL·UL Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0A0F;color:#E8E8F0;font-family:'Space Mono','Courier New',monospace;overscroll-behavior:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
#app{min-height:100vh;padding-bottom:80px}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#0D0D15;border-top:1px solid #1E1E2E;display:flex;z-index:150;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:1px;transition:color 0.2s}
.nav-item .icon{font-size:18px}
.header{background:#0D0D15;border-bottom:1px solid #1E1E2E;padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-1px;color:#FFF}
.page{padding:20px 16px;display:none}
.page.active{display:block}
.card{background:#0D0D15;border-radius:16px;overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;border-radius:8px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;border:1px solid;cursor:pointer;transition:all 0.2s}
.ex-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid #151520}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:12px;color:#CCC;flex:1;padding-right:8px}
.ex-controls{display:flex;align-items:center;gap:8px}
.ctrl-btn{width:28px;height:28px;border-radius:6px;background:#1A1A28;border:1px solid #2A2A3A;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.weight-wrap{text-align:center;min-width:54px}
.weight-input{width:54px;text-align:center;background:transparent;border:none;font-family:inherit;font-size:16px;font-weight:700;outline:none}
.weight-label{font-size:9px;color:#444;letter-spacing:1px}
.timer-btn{width:28px;height:28px;border-radius:6px;border:1px solid #2A2A3A;background:#1A1A28;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.save-btn{width:100%;padding:16px;border-radius:12px;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:2px;cursor:pointer;border:none;transition:all 0.3s}
textarea{width:100%;background:#0D0D15;border:1px solid #1E1E2E;border-radius:12px;color:#888;font-family:inherit;font-size:12px;padding:12px 14px;resize:none;height:72px;margin-bottom:14px;outline:none}
.section-label{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:10px}
.timer-overlay{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:300;width:calc(100% - 32px);max-width:380px;display:none}
.timer-overlay.show{display:block;animation:timerPop 0.3s cubic-bezier(0.22,1,0.36,1) forwards}
.timer-card{background:#0D0D20;border:2px solid;border-radius:20px;padding:20px 24px;box-shadow:0 8px 32px #00000088}
.timer-pill{position:fixed;bottom:90px;right:16px;z-index:299;background:#0D0D15;border:1px solid #2A2A3A;border-radius:40px;padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px #00000066}
.preset-btn{cursor:pointer;border-radius:7px;padding:6px 10px;font-family:inherit;font-weight:700;font-size:11px;transition:all 0.2s;border:1px solid}
.progress-bar-bg{height:4px;background:#1A1A2E;border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width 1s linear,background 0.3s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end}
.modal-overlay.show{display:flex;animation:fadeIn 0.2s ease}
.modal-sheet{width:100%;background:#0D0D15;border-radius:20px 20px 0 0;border-top:1px solid #222;padding:24px 20px 40px;max-height:88vh;overflow-y:auto;animation:slideUp 0.28s cubic-bezier(0.22,1,0.36,1) forwards}
.text-inp{background:#131320;border:1px solid #222;border-radius:8px;color:#DDD;font-family:inherit;font-size:12px;padding:10px 12px;width:100%;outline:none;transition:border-color 0.2s}
.text-inp:focus{border-color:#444}
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#111;border-radius:10px;margin-bottom:6px;border:1px solid #1A1A28}
.rm-btn{background:#1A1A28;border:1px solid #2A2A3A;color:#555;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:inherit;flex-shrink:0}
.rm-btn:hover{background:#FF3D7118;border-color:#FF3D71;color:#FF3D71}
.cardio-card{background:#0D0D15;border-radius:16px;overflow:hidden;margin-bottom:16px;transition:border-color 0.3s}
.toggle-sw{width:44px;height:24px;border-radius:12px;position:relative;transition:all 0.3s;flex-shrink:0;border:1px solid}
.toggle-knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;transition:left 0.25s}
.intensity-btn{cursor:pointer;border-radius:6px;padding:6px 10px;font-family:inherit;font-size:10px;letter-spacing:1px;font-weight:700;transition:all 0.2s;border:1px solid;flex:1}
.report-tabs{display:flex;gap:6px;margin-bottom:20px}
.report-tab{flex:1;padding:10px 6px;border-radius:10px;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;border:1px solid;cursor:pointer;transition:all 0.2s;text-align:center}
.month-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.month-pills::-webkit-scrollbar{display:none}
.month-pill{flex-shrink:0;padding:6px 8px;border-radius:6px;font-size:10px;font-family:inherit;cursor:pointer;letter-spacing:1px;border:1px solid;transition:all 0.2s}
.log-card{background:#0D0D15;border-radius:14px;margin-bottom:12px;overflow:hidden}
.log-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0F0F1A;font-size:12px}
.log-row:last-child{border-bottom:none}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:10px 14px;background:#0D0D15;border-radius:12px;border:1px solid #1E1E2E}
.week-nav-btn{background:transparent;border:1px solid #2A2A3A;color:#888;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes timerPop{0%{opacity:0;transform:translateX(-50%) scale(0.85)}60%{transform:translateX(-50%) scale(1.03)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes timerBlink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes donePulse{0%,100%{box-shadow:0 0 0 0 #00D68F55}50%{box-shadow:0 0 0 14px #00D68F00}}
@keyframes expandDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.expand-down{animation:expandDown 0.3s ease forwards;overflow:hidden}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="logo">PPL<span id="accent-dot">·</span>UL</div>
      <div style="font-size:10px;color:#666;letter-spacing:2px;margin-top:1px">WORKOUT TRACKER</div>
    </div>
    <button onclick="openEditModal()" id="edit-btn" style="background:transparent;border:1px solid #2A2A3A55;color:#666;border-radius:8px;padding:5px 12px;font-size:10px;font-family:inherit;letter-spacing:1px;cursor:pointer">✎ EDITAR</button>
  </div>
  <div class="page active" id="page-home">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div id="today-label" style="font-size:11px;color:#555;letter-spacing:2px"></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="card" id="workout-card" style="margin-bottom:16px">
      <div class="card-header" id="card-header"></div>
      <div id="exercise-list"></div>
    </div>
    <div class="cardio-card" id="cardio-card" style="border:1px solid #1E1E2E">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer" onclick="toggleCardio()">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">🏃</span>
          <div>
            <div id="cardio-title" style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#666">CARDIO</div>
            <div id="cardio-sub" style="font-size:10px;color:#555;margin-top:1px">Toque para registrar</div>
          </div>
        </div>
        <div class="toggle-sw" id="toggle-sw" style="background:#222;border-color:#333">
          <div class="toggle-knob" id="toggle-knob" style="left:2px;background:#555"></div>
        </div>
      </div>
      <div id="cardio-body" style="display:none"></div>
    </div>
    <textarea id="notes-input" placeholder="Observações (opcional)..."></textarea>
    <button class="save-btn" id="save-btn" onclick="saveWorkout()">SALVAR TREINO</button>
  </div>
  <div class="page" id="page-log">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px">Histórico</div>
    <div id="log-count" style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:20px"></div>
    <div id="log-list"></div>
  </div>
  <div class="page" id="page-report">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:16px">Relatórios</div>
    <div class="report-tabs">
      <button class="report-tab" id="rtab-week" onclick="setReportTab('week')">📅 Semana</button>
      <button class="report-tab" id="rtab-month" onclick="setReportTab('month')">📆 Mês</button>
      <button class="report-tab" id="rtab-year" onclick="setReportTab('year')">🗓 Ano</button>
    </div>
    <div id="report-content"></div>
  </div>
</div>
<div class="nav-bar">
  <button class="nav-item" id="nav-home" onclick="setPage('home')"><span class="icon">⌂</span>TREINO</button>
  <button class="nav-item" id="nav-log" onclick="setPage('log')"><span class="icon">◷</span>LOG</button>
  <button class="nav-item" id="nav-report" onclick="setPage('report')"><span class="icon">↗</span>RELATÓRIO</button>
</div>
<div class="timer-pill" id="timer-pill">
  <span style="font-size:14px;color:#555">⏱</span>
  <button class="preset-btn" id="pp60" onclick="startTimer(60)">1'</button>
  <button class="preset-btn" id="pp120" onclick="startTimer(120)">2'</button>
  <button class="preset-btn" id="pp180" onclick="startTimer(180)">3'</button>
</div>
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-card" id="timer-card"><div id="timer-inner"></div></div>
</div>
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:19px">Gerenciar Exercícios</div>
        <div style="font-size:11px;color:#555;margin-top:3px">Adicione ou remova por dia</div>
      </div>
      <button onclick="closeEditModal()" style="background:transparent;border:1px solid #2A2A3A;color:#666;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;font-family:inherit;flex-shrink:0">✕</button>
    </div>
    <div class="day-tabs" id="modal-day-tabs" style="margin-bottom:20px"></div>
    <div id="modal-ex-list"></div>
    <div style="border-top:1px solid #1A1A28;padding-top:20px;margin-top:4px">
      <div class="section-label">ADICIONAR EXERCÍCIO</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input class="text-inp" type="text" id="new-ex-name" placeholder="Nome do exercício"/>
        <div style="display:flex;gap:8px">
          <input class="text-inp" type="number" id="new-ex-weight" placeholder="Peso inicial (kg)" style="flex:1"/>
          <button onclick="addExercise()" id="add-ex-btn" style="background:#00E5FF;border:none;border-radius:8px;color:#000;font-family:inherit;font-weight:700;font-size:12px;padding:10px 16px;cursor:pointer;white-space:nowrap;min-width:120px">+ ADICIONAR</button>
        </div>
        <div style="font-size:10px;color:#444">Deixe o peso em 0 se ainda não definiu.</div>
      </div>
    </div>
  </div>
</div><script>
const MONTHS_PT=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DAYS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DEFAULT_PLAN={
  PULL:{label:"PULL",color:"#00E5FF",sub:"Costa / Bíceps",exercises:[{id:"remada_curv",name:"Remada Curvada",dw:50},{id:"remada_ab",name:"Rem. Pegada Aberta",dw:80},{id:"serrote",name:"Serrote",dw:40},{id:"puxada_tri",name:"Puxada Triângulo",dw:70},{id:"rosca_dir",name:"Rosca Direta",dw:17.5},{id:"encolhimento",name:"Encolhimento",dw:0},{id:"rosca_punho",name:"Rosca Punho",dw:0}]},
  PUSH:{label:"PUSH",color:"#FF3D71",sub:"Peito / Ombro / Tríceps",exercises:[{id:"supino_inc",name:"Supino Inclinado (Halter)",dw:40},{id:"supino_ret",name:"Supino Reto",dw:50},{id:"voador",name:"Voador",dw:80},{id:"elev_lat_s",name:"Elevação Lateral Sentado",dw:12.5},{id:"elev_lat_c",name:"Elev. Lat. Cabo",dw:0},{id:"triceps",name:"Tríceps",dw:75}]},
  LEGS:{label:"LEGS",color:"#FFD60A",sub:"Pernas",exercises:[{id:"flexor_d",name:"Flexor Deitado",dw:90},{id:"hack",name:"Agachamento Hack",dw:60},{id:"leg45",name:"Leg 45",dw:400},{id:"extensor",name:"Extensor",dw:100},{id:"stiff",name:"Stiff Barra",dw:80}]},
  UPPER:{label:"UPPER",color:"#A855F7",sub:"Superior",exercises:[{id:"u_supino_ret",name:"Supino Reto",dw:50},{id:"u_crucifixo",name:"Crucifixo Inc. Cabo",dw:0},{id:"u_pux_ab",name:"Puxada Aberta",dw:80},{id:"u_rem_tri",name:"Rem. Baixo Triângulo",dw:70},{id:"u_elev_lat",name:"Elevação Lateral",dw:12.5},{id:"u_rosca",name:"Rosca Direta B45",dw:15},{id:"u_triceps_fr",name:"Tríceps Francês",dw:65}]},
  LOWER:{label:"LOWER",color:"#00D68F",sub:"Inferior",exercises:[{id:"l_flexor_s",name:"Flexor Sentado",dw:100},{id:"l_flexor_d",name:"Flexor Deitado",dw:90},{id:"l_elev_quad",name:"Elevação Quadril",dw:160},{id:"l_hack",name:"Hack",dw:60},{id:"l_leg45",name:"Leg 45",dw:360}]},
};
function ls(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v));}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function genId(p){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function weekStart(date){const d=new Date(date);d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10);}
function weekEnd(date){const d=new Date(date);d.setDate(d.getDate()+(6-d.getDay()));return d.toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);}
let plan=ls('ppl_plan',DEFAULT_PLAN);
let logs=ls('ppl_logs',[]);
let cardioLogs=ls('ppl_cardio',[]);
let weights={};
let currentDay='PULL';
let currentPage='home';
let cardioEnabled=false;
let cardioDuration=40;
let cardioType='Esteira';
let cardioIntensity='moderado';
let editDay='PULL';
let confirmRemoveId=null;
let reportTab='week';
let currentWeekOffset=0;
let reportYear=new Date().getFullYear();
let reportMonth=new Date().getMonth();
let timerDuration=60;
let timerRemaining=60;
let timerActive=false;
let timerInterval=null;

function startTimer(secs){
  clearInterval(timerInterval);
  timerDuration=secs;timerRemaining=secs;timerActive=true;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timerRemaining--;
    if(timerRemaining<=0){clearInterval(timerInterval);timerActive=false;timerRemaining=0;if(navigator.vibrate)navigator.vibrate([300,100,300]);showTimerDone();return;}
    updateTimerUI();
  },1000);
  document.getElementById('timer-pill').style.display='none';
  document.getElementById('timer-overlay').classList.add('show');
  updateTimerUI();
}
function stopTimer(){
  clearInterval(timerInterval);timerActive=false;timerRemaining=timerDuration;
  document.getElementById('timer-overlay').classList.remove('show');
  if(currentPage==='home')document.getElementById('timer-pill').style.display='flex';
  updatePresetHighlight();
}
function showTimerDone(){
  const tc=document.getElementById('timer-card');
  tc.style.borderColor='#00D68F';tc.style.background='#0A1F14';tc.style.animation='donePulse 0.8s ease 3';
  document.getElementById('timer-inner').innerHTML=`<div style="text-align:center"><div style="font-size:32px;margin-bottom:6px">✅</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#00D68F">DESCANSOU!</div><div style="font-size:11px;color:#00D68F88;margin-top:4px;letter-spacing:2px">HORA DE TREINAR</div></div>`;
  setTimeout(()=>{document.getElementById('timer-overlay').classList.remove('show');const tc2=document.getElementById('timer-card');tc2.style.animation='';if(currentPage==='home')document.getElementById('timer-pill').style.display='flex';},3500);
}
function updateTimerUI(){
  const ac=plan[currentDay]?.color||'#00E5FF';
  const mm=String(Math.floor(timerRemaining/60)).padStart(2,'0');
  const ss2=String(timerRemaining%60).padStart(2,'0');
  const pct=(timerRemaining/timerDuration)*100;
  const urgent=timerRemaining<=10;
  const fillColor=urgent?'#FF3D71':ac;
  const tc=document.getElementById('timer-card');
  tc.style.borderColor=ac;tc.style.background='#0D0D20';tc.style.animation='';
  document.getElementById('timer-inner').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-size:10px;color:#555;letter-spacing:2px">DESCANSO</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:38px;color:${fillColor};line-height:1;${urgent?'animation:timerBlink 0.6s ease infinite':''}">${mm}:${ss2}</div></div>
      <button onclick="stopTimer()" style="background:transparent;border:1px solid #333;color:#555;border-radius:10px;width:36px;height:36px;font-size:16px;cursor:pointer">✕</button>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
    <div style="display:flex;gap:8px">
      ${[{s:60,l:"1 min"},{s:120,l:"2 min"},{s:180,l:"3 min"}].map(o=>`<button onclick="startTimer(${o.s})" style="flex:1;cursor:pointer;border-radius:8px;padding:8px 0;font-family:inherit;font-weight:700;font-size:13px;border:1px solid;background:${timerDuration===o.s?ac+'22':'#111'};color:${timerDuration===o.s?ac:'#555'};border-color:${timerDuration===o.s?ac:'#222'}">${o.l}</button>`).join('')}
    </div>`;
}
function updatePresetHighlight(){
  [60,120,180].forEach(s=>{
    const btn=document.getElementById('pp'+s);if(!btn)return;
    const ac=plan[currentDay]?.color||'#00E5FF';
    btn.style.background=timerDuration===s?ac+'22':'#111';
    btn.style.color=timerDuration===s?ac:'#555';
    btn.style.borderColor=timerDuration===s?ac:'#222';
  });
}
function setPage(p){
  currentPage=p;
  ['home','log','report'].forEach(pg=>{
    document.getElementById('page-'+pg).classList.toggle('active',pg===p);
    const nb=document.getElementById('nav-'+pg);
    const ac=plan[currentDay]?.color||'#00E5FF';
    nb.style.color=pg===p?ac:'#555';
  });
  const pill=document.getElementById('timer-pill');
  pill.style.display=(p==='home'&&!timerActive)?'flex':'none';
  if(p==='log')renderLog();
  if(p==='report')renderReport();
}
function initWeights(){
  const dp=plan[currentDay];
  const last=[...logs].reverse().find(l=>l.day===currentDay);
  dp.exercises.forEach(ex=>{weights[ex.id]=last?.weights?.[ex.id]??ex.dw;});
}
function adjustWeight(id,delta){
  weights[id]=Math.max(0,+(weights[id]||0)+delta);
  const inp=document.getElementById('w_'+id);if(inp)inp.value=weights[id];

  const yr=reportYear;
  const yearLogs=logs.filter(l=>new Date(l.date).getFullYear()===yr);
  const yearCardio=cardioLogs.filter(c=>new Date(c.date).getFullYear()===yr);
  const totalMin=yearCardio.reduce((s,c)=>s+c.duration,0);
  const monthlySessions=Array.from({length:12},(_,i)=>yearLogs.filter(l=>new Date(l.date).getMonth()===i).length);
  const maxS=Math.max(...monthlySessions,1);
  const barChart=monthlySessions.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:9px;color:${v>0?'#E8E8F0':'#555'};font-weight:700">${v||''}</div><div style="width:100%;background:#1A1A28;border-radius:4px;overflow:hidden;height:60px;display:flex;align-items:flex-end"><div style="width:100%;background:${v===maxS?'#00E5FF':'#2A2A4A'};border-radius:4px;height:${v===0?0:Math.max(8,Math.round((v/maxS)*60))}px"></div></div><div style="font-size:8px;color:#555">${['J','F','M','A','M','J','J','A','S','O','N','D'][i]}</div></div>`).join('');
  const bestMonthIdx=monthlySessions.indexOf(Math.max(...monthlySessions));
  const bestMonth=maxS>0?MONTHS_PT[bestMonthIdx]:'—';
  const dayBreakdown=Object.entries(plan).map(([dayKey,dp])=>{
    const n=yearLogs.filter(l=>l.day===dayKey).length;
    const pct=yearLogs.length>0?Math.round((n/yearLogs.length)*100):0;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #0F0F1A"><span style="font-family:'Syne',sans-serif;font-weight:800;color:${dp.color};font-size:13px;min-width:52px">${dayKey}</span><div style="flex:1;height:6px;background:#1A1A28;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${dp.color};border-radius:3px"></div></div><span style="font-size:12px;color:#888;min-width:28px;text-align:right">${n}x</span></div>`;
  }).join('');
  const annualProgress=Object.entries(plan).map(([dayKey,dp])=>{
    const dayLogs=yearLogs.filter(l=>l.day===dayKey).sort((a,b)=>a.date.localeCompare(b.date));
    if(dayLogs.length<2)return '';
    const first=dayLogs[0],last=dayLogs[dayLogs.length-1];const c=dp.color;
    const rows=dp.exercises.map(ex=>{const fw=first.weights?.[ex.id]??0,lw=last.weights?.[ex.id]??0,diff=lw-fw;return diff!==0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:11px;border-bottom:1px solid #0F0F1A"><span style="color:#888">${ex.name}</span><div style="display:flex;align-items:center;gap:8px"><span style="color:#555">${fw}kg</span><span style="color:#333">→</span><span style="color:#CCC;font-weight:700">${lw}kg</span><span style="font-weight:700;color:${diff>0?'#00D68F':'#FF3D71'}">${diff>0?'+':''}${diff.toFixed(1)}</span></div></div>`:''}).filter(Boolean).join('');
    if(!rows)return '';
    return `<div style="background:#0D0D15;border:1px solid ${c}22;border-radius:12px;margin-bottom:10px;overflow:hidden"><div style="background:${c}15;padding:10px 14px"><span style="font-family:'Syne',sans-serif;font-weight:800;color:${c}">${dayKey}</span><span style="font-size:11px;color:#666;margin-left:8px">${dayLogs.length} sessões no ano</span></div><div style="padding:6px 14px">${rows}</div></div>`;
  }).filter(Boolean).join('');
  const yearBtns=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button onclick="reportYear--;renderReport()" style="background:transparent;border:1px solid #2A2A3A;color:#888;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px">‹</button><span style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;flex:1;text-align:center">${yr}</span><button onclick="if(reportYear<new Date().getFullYear())reportYear++;renderReport()" style="background:transparent;border:1px solid #2A2A3A;color:#888;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px">›</button></div>`;
  return `${yearBtns}<div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:1;background:#0D0D15;border:1px solid #1E1E2E;border-radius:12px;padding:14px;text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px">${yearLogs.length}</div><div style="font-size:10px;color:#555;letter-spacing:1px;margin-top:2px">TREINOS</div></div><div style="flex:1;background:#0D0D15;border:1px solid #FF9F0A22;border-radius:12px;padding:14px;text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#FF9F0A">${Math.round(totalMin/60)}</div><div style="font-size:10px;color:#555;letter-spacing:1px;margin-top:2px">HORAS CARDIO</div></div><div style="flex:1;background:#0D0D15;border:1px solid #00D68F22;border-radius:12px;padding:14px;text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#00D68F">${bestMonth}</div><div style="font-size:10px;color:#555;letter-spacing:1px;margin-top:2px">MELHOR MÊS</div></div></div><div style="background:#0D0D15;border:1px solid #1E1E2E;border-radius:12px;padding:16px;margin-bottom:16px"><div class="section-label" style="margin-bottom:12px">TREINOS POR MÊS</div><div style="display:flex;gap:4px;align-items:flex-end">${barChart}</div></div><div style="background:#0D0D15;border:1px solid #1E1E2E;border-radius:12px;padding:16px;margin-bottom:16px"><div class="section-label" style="margin-bottom:4px">DISTRIBUIÇÃO POR DIA</div>${dayBreakdown}</div>${annualProgress?`<div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:12px">Evolução Anual de Carga</div>${annualProgress}`:'<div style="text-align:center;color:#444;font-size:13px;padding:20px 0">Treine mais para ver a evolução!</div>'}`;
}
function openEditModal(){editDay=currentDay;renderEditModal();document.getElementById('edit-modal').classList.add('show');}
function closeEditModal(){document.getElementById('edit-modal').classList.remove('show');confirmRemoveId=null;}
function renderEditModal(){
  const ac=plan[editDay]?.color||'#00E5FF';
  document.getElementById('add-ex-btn').style.background=ac;
  const mt=document.getElementById('modal-day-tabs');mt.innerHTML='';
  Object.entries(plan).forEach(([key,val])=>{
    const btn=document.createElement('button');btn.className='day-tab';btn.textContent=key;
    btn.style.background=key===editDay?val.color:'#111';btn.style.color=key===editDay?'#000':'#555';btn.style.borderColor=key===editDay?val.color:'#222';
    btn.onclick=()=>{editDay=key;confirmRemoveId=null;renderEditModal();};
    mt.appendChild(btn);
  });
  const dp=plan[editDay];
  const rows=dp.exercises.map(ex=>{
    const isConfirm=confirmRemoveId===ex.id;
    return `<div class="ex-item"><div style="flex:1"><div style="font-size:12px;color:#CCC">${ex.name}</div><div style="font-size:10px;color:#555;margin-top:2px">${ex.dw} kg padrão</div></div>${isConfirm?`<div style="display:flex;gap:6px;flex-shrink:0"><button onclick="confirmRemoveId=null;renderEditModal()" style="background:transparent;border:1px solid #333;color:#666;border-radius:6px;padding:5px 10px;font-size:10px;font-family:inherit;cursor:pointer">Cancelar</button><button onclick="removeExercise('${ex.id}')" style="background:#FF3D7122;border:1px solid #FF3D71;color:#FF3D71;border-radius:6px;padding:5px 12px;font-size:10px;font-family:inherit;cursor:pointer;font-weight:700">Remover</button></div>`:`<button class="rm-btn" onclick="confirmRemoveId='${ex.id}';renderEditModal()">✕</button>`}</div>`;
  }).join('');
  document.getElementById('modal-ex-list').innerHTML=`<div class="section-label">EXERCÍCIOS — ${dp.label} (${dp.exercises.length})</div>${rows||'<div style="font-size:12px;color:#444;padding:12px 0;text-align:center">Nenhum exercício.</div>'}`;
  document.getElementById('new-ex-name').value='';document.getElementById('new-ex-weight').value='';
}
function addExercise(){
  const name=document.getElementById('new-ex-name').value.trim();if(!name)return;
  const dw=parseFloat(document.getElementById('new-ex-weight').value)||0;
  const id=genId(editDay.toLowerCase());
  plan[editDay].exercises.push({id,name,dw});ss('ppl_plan',plan);
  confirmRemoveId=null;
  const btn=document.getElementById('add-ex-btn');btn.textContent='✓ ADICIONADO';
  setTimeout(()=>{btn.textContent='+ ADICIONAR';},1800);
  renderEditModal();initWeights();renderHome();
}
function removeExercise(id){
  plan[editDay].exercises=plan[editDay].exercises.filter(e=>e.id!==id);
  ss('ppl_plan',plan);confirmRemoveId=null;renderEditModal();initWeights();renderHome();
}
initWeights();renderHome();setReportTab('week');updatePresetHighlight();
</script>
</body>
